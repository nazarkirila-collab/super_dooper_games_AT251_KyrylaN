<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM INFECTED</title>
    <link rel="stylesheet" href="../styles/variables.css">
    <link rel="stylesheet" href="../styles/common.css">

    <style>
        body {
            margin: 0;
            background-color: var(--black);
            background-image: url('../images/virus_bg.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .death-container {
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border: 3px solid #ff4500; 
            box-shadow: 0 0 20px #ff4500;
            text-align: center;
            max-width: 600px;
        }

        .virus-text {
            color: #ff4500;
            font-family: 'Courier New', monospace;
            font-size: 2rem;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff4500;
        }

        .error-code {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            color: #ff4500;
            border: 2px solid #ff4500;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ff4500;
            color: white;
            box-shadow: 0 0 20px #ff4500;
        }
    </style>
</head>
<body>
    <div class="death-container">
        <div class="virus-text">VIRUS DETECTED</div>
        <div class="error-code">
            Вірус-черв'як виявився швидшим. <br>
            Ваша оперативна пам'ять повністю поглинута. <br>
            Система перейшла під контроль стороннього коду.
        </div>
        <a href="../index.html" class="btn">ПЕРЕЗАВАНТАЖИТИ СИСТЕМУ</a>
    </div>
</body>
</html>
