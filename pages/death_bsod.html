<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM FAILURE</title>
    <link rel="stylesheet" href="../styles/variables.css">
    <link rel="stylesheet" href="../styles/common.css">

    <style>
        body {
            margin: 0;
            background-color: #0000aa; 
            background-image: url('../images/bsod_bg.jpg'); 
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .death-container {
            background: rgba(0, 0, 170, 0.85); 
            padding: 50px;
            border: 3px solid #fff; 
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            text-align: center;
            max-width: 650px;
            backdrop-filter: blur(5px);
        }

        .death-title {
            color: #fff;
            font-size: 3rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            font-family: 'Courier New', monospace;
        }

        .death-desc {
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            color: #0000aa; 
            background: #fff;
            border: 2px solid #fff;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s ease;
        }

        .btn:hover {
            background: transparent;
            color: #fff;
            box-shadow: 0 0 20px #fff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="death-container">
        <div class="death-title">SYSTEM FAILURE</div>
        <div class="death-desc">
            Критична помилка сегментації. <br>
            Вашу свідомість було стерто захисним протоколом ядра. <br>
            Спробуйте відновити дані з останнього бекапу.
        </div>
        <a href="../index.html" class="btn">Спробувати знову</a>
    </div>
</body>
</html>
