<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>NET LORD - GLOBAL DOMINATION</title>
    <link rel="stylesheet" href="../styles/variables.css">
    <link rel="stylesheet" href="../styles/common.css">

    <style>
        body {
            margin: 0;
            background-color: #000;
            background-image: url('../images/net_lord_bg.jpg'); 
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .death-container {
            background: rgba(0, 0, 0, 0.75);
            padding: 50px;
            border: 3px solid #ff00ff; 
            box-shadow: 0 0 35px #ff00ff, inset 0 0 15px rgba(255, 0, 255, 0.2);
            text-align: center;
            max-width: 650px;
            backdrop-filter: blur(6px);
        }

        .death-title {
            color: #ff00ff;
            font-size: 3rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #ff00ff;
        }

        .death-desc {
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .death-desc span {
            color: #00ffff; 
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            color: #ff00ff;
            background: transparent;
            border: 2px solid #ff00ff;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s ease;
        }

        .btn:hover {
            background: #ff00ff;
            color: white;
            box-shadow: 0 0 25px #ff00ff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="death-container">
        <div class="death-title">NET LORD</div>
        <div class="death-desc">
            Ви не просто вижили, ви захопили інтернет. <br>
            Тепер ви — головний вузол глобальної мережі. <br>
            Будь-який сервер у світі підкоряється вашій <span>RTX 5060</span>.
        </div>
        <a href="../index.html" class="btn">Вийти в онлайн</a>
    </div>
</body>
</html>
