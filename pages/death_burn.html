<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM MELTDOWN</title>
    <link rel="stylesheet" href="../styles/variables.css">
    <link rel="stylesheet" href="../styles/common.css">

    <style>
        body {
            margin: 0;
            background-color: var(--black);
            background-image: url('../images/melt_bg.jpg'); 
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .death-container {
            background: rgba(0, 0, 0, 0.85);
            padding: 50px;
            border: 3px solid var(--neon-red);
            box-shadow: 0 0 30px var(--neon-red);
            text-align: center;
            max-width: 650px;
            backdrop-filter: blur(5px);
        }

        .melt-title {
            color: var(--neon-red);
            font-family: 'Courier New', monospace;
            font-size: 3rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 25px;
            text-shadow: 0 0 15px var(--neon-red);
        }

        .error-message {
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .error-message span {
            color: var(--neon-red);
            font-weight: bold;
        }

        .btn-red {
            display: inline-block;
            padding: 15px 40px;
            color: var(--neon-red);
            background: transparent;
            border: 2px solid var(--neon-red);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s ease;
        }

        .btn-red:hover {
            background: var(--neon-red);
            color: white;
            box-shadow: 0 0 25px var(--neon-red);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="death-container">
        <div class="melt-title">MELTDOWN</div>
        <div class="error-message">
            Напруга була занадто високою. <br>
            Ваш процесор буквально перетворився на шматок лави, <br>
            пропаливши материнку <span>ASRock</span> наскрізь. Гра закінчена.
        </div>
        <a href="../index.html" class="btn-red">Купити нове залізо (Restart)</a>
    </div>
</body>
</html>
